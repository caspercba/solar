<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Dashboard — Rio del Medio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-icon">&#9728;</div>
      <h1>Solar Dashboard</h1>
      <p class="login-subtitle">Rio del Medio</p>
      <form id="login-form" autocomplete="on">
        <input type="text" id="login-user" placeholder="Username" autocomplete="username" required>
        <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" required>
        <button type="submit" id="login-btn">Sign in</button>
      </form>
      <p id="login-error" class="error" hidden></p>
    </div>
  </div>

  <!-- Dashboard screen -->
  <div id="dashboard-screen" class="screen" hidden>
    <header>
      <h1>Solar Dashboard</h1>
      <div class="header-right">
        <span id="status-dot" class="dot dot-ok" title="Connected"></span>
        <button id="logout-btn" title="Sign out">&#x2715;</button>
      </div>
    </header>

    <nav class="view-toggle">
      <button class="vtab active" id="tab-cards">Cards</button>
      <button class="vtab" id="tab-flow">Flow</button>
    </nav>

    <main id="cards-view" class="cards">
      <!-- Battery card -->
      <div class="card card-battery">
        <div class="card-header">
          <span class="card-icon">&#x1F50B;</span>
          <span class="card-title">Battery</span>
        </div>
        <div class="card-value">
          <span id="bat-pct" class="big-number">--</span><span class="unit">%</span>
        </div>
        <div class="card-bar-wrap">
          <div id="bat-bar" class="card-bar" style="width:0%"></div>
        </div>
        <div class="bat-status">
          <span id="bat-direction" class="bat-direction">--</span>
          <span id="bat-rate" class="bat-rate"></span>
        </div>
        <div class="card-detail">
          <span id="bat-volts">--</span> V
          <span class="sep">|</span>
          <span id="bat-current">--</span> A
        </div>
      </div>

      <!-- Solar card -->
      <div class="card card-solar">
        <div class="card-header">
          <span class="card-icon">&#9728;</span>
          <span class="card-title">Solar</span>
        </div>
        <div class="card-value">
          <span id="sol-pct" class="big-number">--</span><span class="unit">%</span>
        </div>
        <div class="card-bar-wrap">
          <div id="sol-bar" class="card-bar" style="width:0%"></div>
        </div>
        <div class="card-detail">
          <span id="sol-watts">--</span> W
          <span class="sep">|</span>
          <span id="sol-pv-volts">--</span> V pv
        </div>
      </div>

      <!-- Load card -->
      <div class="card card-load">
        <div class="card-header">
          <span class="card-icon">&#9889;</span>
          <span class="card-title">Load</span>
        </div>
        <div class="card-value">
          <span id="load-pct" class="big-number">--</span><span class="unit">%</span>
        </div>
        <div class="card-bar-wrap">
          <div id="load-bar" class="card-bar" style="width:0%"></div>
        </div>
        <div class="card-detail">
          <span id="load-watts">--</span> W
        </div>
      </div>

      <!-- Generator card -->
      <div id="card-gen" class="card card-gen">
        <div class="card-header">
          <span class="card-icon">&#x2699;</span>
          <span class="card-title">Generator</span>
        </div>
        <div class="gen-status-row">
          <span id="gen-status" class="gen-badge gen-off">OFF</span>
        </div>
        <div class="card-detail">
          <span id="gen-watts">0</span> W
          <span class="sep">|</span>
          <span id="gen-volts">--</span> V
        </div>
      </div>
    </main>

    <section id="flow-view" class="flow-view" hidden>
      <svg viewBox="0 0 500 440" class="flow-svg" xmlns="http://www.w3.org/2000/svg">

        <!-- Flow paths (bottom layer) -->
        <path id="fp-solar" class="fp" d="M250,100 L250,195"/>
        <path id="fp-gen"   class="fp" d="M100,215 L230,215"/>
        <path id="fp-load"  class="fp" d="M270,215 L400,215"/>
        <path id="fp-bat"   class="fp" d="M250,235 L250,340"/>

        <!-- Flow watt labels -->
        <text id="fl-solar" class="fl" x="268" y="150" text-anchor="start"></text>
        <text id="fl-gen"   class="fl" x="165" y="203" text-anchor="middle"></text>
        <text id="fl-load"  class="fl" x="335" y="203" text-anchor="middle"></text>
        <text id="fl-bat"   class="fl" x="268" y="290" text-anchor="start"></text>

        <!-- Node: Solar -->
        <circle id="fn-solar-bg" cx="250" cy="58" r="42" class="fn-bg"/>
        <text x="250" y="38" class="fn-lbl" text-anchor="middle">SOLAR</text>
        <text x="250" y="60" class="fn-icon" text-anchor="middle">&#9728;&#65039;</text>
        <text id="fn-solar-v" x="250" y="82" class="fn-val" text-anchor="middle">--</text>

        <!-- Node: Generator -->
        <circle id="fn-gen-bg" cx="58" cy="215" r="42" class="fn-bg"/>
        <text x="58" y="195" class="fn-lbl" text-anchor="middle">GEN</text>
        <text x="58" y="218" class="fn-icon" text-anchor="middle">&#x2699;&#65039;</text>
        <text id="fn-gen-v" x="58" y="240" class="fn-val" text-anchor="middle">OFF</text>

        <!-- Node: Inverter (center hub) -->
        <circle cx="250" cy="215" r="20" class="fn-bg fn-inv-bg"/>
        <text x="250" y="219" class="fn-icon fn-icon-sm" text-anchor="middle">&#9889;</text>

        <!-- Node: House -->
        <circle id="fn-house-bg" cx="442" cy="215" r="42" class="fn-bg"/>
        <text x="442" y="195" class="fn-lbl" text-anchor="middle">HOUSE</text>
        <text x="442" y="218" class="fn-icon" text-anchor="middle">&#127968;</text>
        <text id="fn-house-v" x="442" y="240" class="fn-val" text-anchor="middle">--</text>

        <!-- Node: Battery -->
        <circle id="fn-bat-bg" cx="250" cy="382" r="42" class="fn-bg"/>
        <text x="250" y="362" class="fn-lbl" text-anchor="middle">BATTERY</text>
        <text x="250" y="385" class="fn-icon" text-anchor="middle">&#128267;</text>
        <text id="fn-bat-v" x="250" y="407" class="fn-val" text-anchor="middle">--</text>

        <!-- Battery detail below circle -->
        <text id="fn-bat-detail" x="250" y="436" class="fn-detail" text-anchor="middle"></text>
      </svg>
    </section>

    <footer>
      <span id="last-update">Last update: --</span>
      <span id="energy-today"></span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
